<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
  <h1>Registrarse</h1>

  <app-input controlName="register-name" label="Nombre Completo" type="text" formControlName="name"></app-input>
  <app-input controlName="register-phone" label="Telefono" type="text" formControlName="phone"></app-input>
  <app-input controlName="register-email" label="Email" type="email" formControlName="email"></app-input>
  <app-input controlName="register-password" label="Contraseña" type="password" formControlName="password"></app-input>
  <app-input controlName="register-confirmPassword" label="Confirmar Contraseña" type="password" formControlName="confirmPassword"></app-input>

  <app-button [style]="'primary'" type="submit" class="mt-4" [disabled]="!registerForm.valid">
    <ng-template>Registrarse</ng-template>
  </app-button>

  <div class="mobile-toggle-link">
    ¿Ya tienes cuenta?
    <a href="#" (click)="$event.preventDefault(); goToLogin.emit()">Inicia Sesión</a>
  </div>
</form>
